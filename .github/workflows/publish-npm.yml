name: Publish Node.js to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          # Linux x86_64 (glibc)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            triple: x86_64-unknown-linux-gnu
          # Linux x86_64 (musl)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            triple: x86_64-unknown-linux-musl
            container: rust:latest
          # macOS x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            triple: x86_64-apple-darwin
          # macOS ARM64 (Apple Silicon)
          - os: macos-14
            target: aarch64-apple-darwin
            triple: aarch64-apple-darwin
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            triple: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    name: Build for ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        if: runner.os != 'Linux' || matrix.container == ''
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Node.js (in container)
        if: matrix.container != ''
        run: |
          apt-get update && apt-get install -y nodejs npm

      - name: Set up Rust
        if: runner.os != 'Linux' || matrix.container == ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Rust (in container)
        if: matrix.container != ''
        run: |
          rustup target add ${{ matrix.target }}

      - name: Install dependencies
        working-directory: bindings/innertext-node
        run: npm install

      - name: Build native module
        working-directory: bindings/innertext-node
        run: |
          npm run build:release -- --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: bindings/innertext-node/*.node

  publish-npm:
    needs: build-binaries
    runs-on: ubuntu-latest
    name: Publish to npm

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: bindings/innertext-node
          merge-multiple: true

      - name: Install dependencies
        working-directory: bindings/innertext-node
        run: npm install

      - name: Publish to npm
        working-directory: bindings/innertext-node
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
