name: Test & Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test-core:
    runs-on: ubuntu-latest
    name: Test core library

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test -p innertext-core --all

  check-bindings:
    strategy:
      matrix:
        binding:
          - innertext-python
          - innertext-node
          - innertext-java

    runs-on: ubuntu-latest
    name: Check ${{ matrix.binding }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        if: matrix.binding == 'innertext-python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        if: matrix.binding == 'innertext-node'
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.binding }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Check
        run: cargo check -p ${{ matrix.binding }}

  lint:
    runs-on: ubuntu-latest
    name: Lint & Format

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt -- --check

      # Lint non-Python crates
      - name: Run clippy (core + node + java)
        run: >
          cargo clippy
          -p innertext-core
          -p innertext-node
          -p innertext-java
          --all-targets -- -D warnings

      # Python binding requires pyo3/extension-module to surface PyO3-specific lints
      - name: Run clippy (python binding)
        run: >
          cargo clippy
          -p innertext-python
          --features pyo3/extension-module
          --all-targets -- -D warnings
