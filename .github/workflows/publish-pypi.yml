name: Publish Python to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-wheels:
    strategy:
      matrix:
        include:
          # Linux x86_64 (glibc, manylinux)
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          # Linux x86_64 (musl)
          - os: ubuntu-latest
            target: x86_64
            manylinux: musllinux_1_1
          # Linux aarch64 (glibc, manylinux)
          - os: ubuntu-latest
            target: aarch64
            manylinux: auto
          # Linux aarch64 (musl)
          - os: ubuntu-latest
            target: aarch64
            manylinux: musllinux_1_1
          # macOS x86_64
          - os: macos-13
            target: x86_64
            manylinux: auto
          # macOS ARM64 (Apple Silicon)
          - os: macos-14
            target: aarch64
            manylinux: auto
          # Windows x86_64
          - os: windows-latest
            target: x86_64
            manylinux: auto

    runs-on: ${{ matrix.os }}
    name: Build wheel (${{ matrix.os }}, ${{ matrix.target }}, ${{ matrix.manylinux }})

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist
          working-directory: bindings/innertext-python

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}-${{ matrix.manylinux }}
          path: bindings/innertext-python/dist/

  build-sdist:
    runs-on: ubuntu-latest
    name: Build source distribution

    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: bindings/innertext-python

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: bindings/innertext-python/dist/

  publish-pypi:
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    name: Publish to PyPI

    # Uses OpenID Connect (OIDC) for secure, token-free publishing
    environment:
      name: pypi
      url: https://pypi.org/project/innertext

    permissions:
      id-token: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
