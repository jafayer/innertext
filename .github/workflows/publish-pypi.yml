name: Publish Python to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-wheels:
    strategy:
      matrix:
        include:
          # Linux x86_64 (glibc)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            maturin-args: ""
          # Linux x86_64 (musl)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            maturin-args: "--manylinux 2_28"
          # macOS x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            maturin-args: ""
          # macOS ARM64 (Apple Silicon)
          - os: macos-14
            target: aarch64-apple-darwin
            maturin-args: ""
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            maturin-args: ""

    runs-on: ${{ matrix.os }}
    name: Build wheel for ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        working-directory: bindings/innertext-python
        run: |
          maturin build \
            --release \
            --target ${{ matrix.target }} \
            ${{ matrix.maturin-args }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: bindings/innertext-python/target/wheels/

  publish-pypi:
    needs: build-wheels
    runs-on: ubuntu-latest
    name: Publish to PyPI

    # GitHub Actions environment for publishing
    # Uses OpenID Connect (OIDC) for secure, token-free publishing
    environment:
      name: pypi
      url: https://pypi.org/project/innertext

    # Required permissions for OIDC token generation
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # Publish using OIDC trusted publisher (no stored tokens needed)
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
